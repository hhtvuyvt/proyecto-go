<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <title>Biblioteca</title>


  <style>

    body{
      font-family:Arial,sans-serif;
      margin:40px;
    }


    .book{

      border:1px solid #ccc;
      padding:15px;
      margin:10px;

    }


    img{

      max-width:150px;

    }

  </style>


</head>


<body>


<h1>📚 Biblioteca</h1>


<h2>Nuevo libro</h2>


<label>Título</label>

<label for="title"></label><input id="title">


<label>Autor</label>

<label for="author"></label><input id="author">


<label>ISBN</label>

<label for="isbn"></label><input id="isbn">


<label>Portada</label>

<input
        id="image"
        type="file"
        accept="image/*"
>



<button onclick="createBook()">
  Agregar
</button>



<h2>Libros</h2>


<div id="books"></div>





<script>


  let jwtToken="";



  async function loadToken(){


    const r =
            await fetch("/api/login");


    const data =
            await r.json();


    jwtToken =
            data.token;


  }





  async function loadBooks(){


    const r =
            await fetch("/api/books");


    const books =
            await r.json();



    const box =
            document.getElementById("books");



    box.innerHTML="";



    books.forEach(book=>{


      box.innerHTML += `


<div class="book">


<h3>
${book.title}
</h3>


${book.image ?
              `
<img src="${book.image}" alt="portada del libro">
`
              :
              ""
      }



<p>
${book.author}
</p>


<p>
${book.isbn}
</p>



<button onclick="editBook(${book.id})">
Editar
</button>


<button onclick="deleteBook(${book.id})">
Borrar
</button>



</div>


`;

    });


  }






  async function createBook(){


    let image="";



    const file =
            document.getElementById("image")
                    .files[0];



    if(file){


      const form =
              new FormData();



      form.append(
              "image",
              file
      );



      const upload =
              await fetch(
                      "/api/upload",
                      {

                        method:"POST",

                        headers:{

                          "Authorization":
                                  "Bearer "+jwtToken

                        },


                        body:form


                      });



      const data =
              await upload.json();



      image =
              data.path;


    }




    const book={


      title:
      document.getElementById("title").value,


      author:
      document.getElementById("author").value,


      isbn:
      document.getElementById("isbn").value,


      image:image

    };




    await fetch(
            "/api/books",
            {

              method:"POST",

              headers:{

                "Content-Type":
                        "application/json"

              },

              body:
                      JSON.stringify(book)

            }

    );



    await loadBooks();


  }






  async function deleteBook(id){


    await fetch(
            "/api/books/"+id,
            {

              method:"DELETE",

              headers:{

                "Authorization":
                        "Bearer "+jwtToken

              }

            });


    await loadBooks();

  }







  async function editBook(id){


    const title =
            prompt(
                    "Nuevo titulo"
            );



    if(!title)
      return;



    await fetch(
            "/api/books/"+id,
            {

              method:"PUT",

              headers:{

                "Content-Type":
                        "application/json",

                "Authorization":
                        "Bearer "+jwtToken

              },


              body:
                      JSON.stringify({

                        title:title

                      })


            });


    await loadBooks();


  }






  window.onload =
          async()=>{


            await loadToken();


            await loadBooks();


          };



</script>


</body>


</html>
