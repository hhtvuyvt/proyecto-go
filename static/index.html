<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Biblioteca</title>


  <style>

    body{
      font-family: Arial, sans-serif;
      margin:40px;
    }


    .book{
      border:1px solid #ccc;
      padding:15px;
      margin:10px;
      border-radius:8px;
    }


    button{
      margin-right:5px;
    }


  </style>

</head>


<body>


<h1>📚 Biblioteca</h1>


<h2>Agregar libro</h2>


<input id="title" placeholder="Título">

<input id="author" placeholder="Autor">

<input id="isbn" placeholder="ISBN">
<h2>Agregar libro</h2>


<label for="title">
  Título:
</label>

<input
        id="title"
        name="title"
        placeholder="Título"
>



<label for="author">
  Autor:
</label>

<input
        id="author"
        name="author"
        placeholder="Autor"
>



<label for="isbn">
  ISBN:
</label>

<input
        id="isbn"
        name="isbn"
        placeholder="ISBN"
>


<button onclick="createBook()">
  Agregar
</button>

<button onclick="createBook()">
  Agregar
</button>



<h2>Libros</h2>


<div id="books"></div>



<script>


  // ============================
  // TOKEN JWT
  // ============================


  let jwtToken = "";


  // Obtiene token del backend
  async function loadToken(){

    try{

      const response =
              await fetch("/api/login");


      const data =
              await response.json();


      jwtToken = data.token;


    }catch(error){

      console.error(
              "No se pudo obtener token",
              error
      );

    }

  }





  // ============================
  // LIBROS
  // ============================



  async function loadBooks(){


    const response =
            await fetch("/api/books");


    const books =
            await response.json();



    const container =
            document.getElementById("books");


    container.innerHTML="";



    books.forEach(book=>{


      container.innerHTML += `

        <div class="book">


            <h3>
            ${book.title}
            </h3>


            <p>
            Autor:
            ${book.author}
            </p>


            <p>
            ISBN:
            ${book.isbn}
            </p>


            <button onclick="editBook(${book.id})">
                Editar
            </button>


            <button onclick="deleteBook(${book.id})">
                Borrar
            </button>


        </div>

        `;


    });


  }







  // ============================
  // CREAR
  // ============================



  async function createBook(){


    const book={


      title:
      document.getElementById("title").value,


      author:
      document.getElementById("author").value,


      isbn:
      document.getElementById("isbn").value

    };



    await fetch(
            "/api/books",
            {

              method:"POST",


              headers:{

                "Content-Type":
                        "application/json"

              },


              body:
                      JSON.stringify(book)

            }
    );



    loadBooks();

  }





  // ============================
  // BORRAR
  // ============================



  async function deleteBook(id){



    const response =
            await fetch(
                    "/api/books/"+id,
                    {

                      method:"DELETE",


                      headers:{

                        "Authorization":
                                "Bearer "+jwtToken

                      }

                    }
            );



    if(!response.ok){

      alert(
              "No se pudo borrar el libro"
      );

      return;
    }



    loadBooks();

  }







  // ============================
  // EDITAR
  // ============================



  async function editBook(id){



    const title =
            prompt(
                    "Nuevo título:"
            );


    if(!title){
      return;
    }



    const book={

      title:title

    };



    const response =
            await fetch(
                    "/api/books/"+id,
                    {

                      method:"PUT",


                      headers:{


                        "Content-Type":
                                "application/json",


                        "Authorization":
                                "Bearer "+jwtToken


                      },


                      body:
                              JSON.stringify(book)

                    }
            );



    if(!response.ok){

      alert(
              "No se pudo editar"
      );

      return;

    }



    loadBooks();


  }





  // ============================
  // INICIO
  // ============================


  window.onload =
          async function(){


            await loadToken();


            await loadBooks();


          };


</script>


</body>

</html>
