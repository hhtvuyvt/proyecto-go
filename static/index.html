<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tienda de Libros</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Tienda&nbsp;de&nbsp;Libros</a>
    </div>
  </nav>

  <div class="container my-4">
    <h2 class="mb-3">Agregar Libro</h2>
    <form id="book-form" class="row g-3" enctype="multipart/form-data">
      <div class="col-md-6">
        <label for="titulo" class="form-label">Título</label>
        <input type="text" class="form-control" id="titulo" required>
      </div>
      <div class="col-md-6">
        <label for="autor" class="form-label">Autor</label>
        <input type="text" class="form-control" id="autor" required>
      </div>
      <div class="col-md-4">
        <label for="isbn" class="form-label">ISBN</label>
        <input type="text" class="form-control" id="isbn" required>
      </div>
      <div class="col-md-8">
        <label for="imagen" class="form-label">Portada</label>
        <input type="file" class="form-control" id="imagen-archivo">
        <input type="url" class="form-control mt-2" id="imagen-url" placeholder="o pega una URL...">
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-success">Agregar</button>
      </div>
    </form>

    <hr class="my-4">

    <h2 class="mb-3">Catálogo</h2>
    <div id="book-list" class="row gy-4"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_URL = "/api/books";

    function addBookToDOM(book) {
      const col = document.createElement('div');
      col.className = 'col-sm-6 col-md-4 col-lg-3';
      col.dataset.id = book.id;
      col.innerHTML = `
        <div class="card h-100 shadow-sm">
          <img src="${book.image}" class="card-img-top" alt="${book.title}">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">${book.title}</h5>
            <p class="card-text mb-1"><strong>Autor:</strong> ${book.author}</p>
            <p class="card-text text-muted"><small>${book.isbn}</small></p>
            <button class="btn btn-outline-danger mt-auto eliminar">Eliminar</button>
          </div>
        </div>`;
      document.getElementById('book-list').appendChild(col);
    }

    async function fetchBooks() {
      const res = await fetch(API_URL);
      if (!res.ok) return;
      const books = await res.json();
      books.forEach(addBookToDOM);
    }

    document.getElementById('book-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      let imageURL = document.getElementById('imagen-url').value.trim();
      const fileInput = document.getElementById('imagen-archivo');

      if (fileInput.files.length > 0) {
        const formData = new FormData();
        formData.append("image", fileInput.files[0]);
        const res = await fetch("/api/upload", { method: "POST", body: formData });
        if (res.ok) {
          const json = await res.json();
          imageURL = json.url;
        } else {
          alert("Error subiendo imagen");
          return;
        }
      }

      const data = {
        title: document.getElementById('titulo').value.trim(),
        author: document.getElementById('autor').value.trim(),
        isbn: document.getElementById('isbn').value.trim(),
        image: imageURL || 'https://via.placeholder.com/150x220?text=Portada'
      };

      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (!res.ok) {
        alert("Error creando el libro");
        return;
      }

      const book = await res.json();
      addBookToDOM(book);
      this.reset();
      document.getElementById('titulo').focus();
    });

    document.getElementById('book-list').addEventListener('click', async function (e) {
      if (!e.target.classList.contains('eliminar')) return;
      const card = e.target.closest('[data-id]');
      const id = card.dataset.id;
      const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
      if (res.ok) card.remove();
    });

    fetchBooks();
  </script>
</body>
</html>
