<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Tienda de Libros</title>


  <link
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>


<body>


<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

  <div class="container">

    <a class="navbar-brand">
      Tienda de Libros
    </a>

  </div>

</nav>



<div class="container my-4">


  <h2>
    Agregar / Editar Libro
  </h2>


  <form
          id="book-form"
          class="row g-3">


    <div class="col-md-6">

      <label
              for="titulo"
              class="form-label">

        Título

      </label>


      <input
              id="titulo"
              class="form-control"
              required>

    </div>




    <div class="col-md-6">


      <label
              for="autor"
              class="form-label">

        Autor

      </label>


      <input
              id="autor"
              class="form-control"
              required>


    </div>





    <div class="col-md-4">


      <label
              for="isbn"
              class="form-label">

        ISBN

      </label>


      <input
              id="isbn"
              class="form-control"
              required>


    </div>





    <div class="col-md-8">


      <label
              for="image"
              class="form-label">

        Portada

      </label>


      <input

              id="image"

              class="form-control"

              placeholder="URL imagen">

    </div>





    <div class="col-12">


      <button

              id="saveButton"

              class="btn btn-success"

              type="submit">

        Agregar libro

      </button>


    </div>



  </form>



  <hr>


  <h2>
    Catálogo
  </h2>


  <div
          id="book-list"
          class="row gy-4">

  </div>



</div>





<script>


  const API="/api/books";


  let token=null;

  let editingBookId=null;




  async function loadToken(){


    const response =
            await fetch("/api/login");



    if(!response.ok)
      throw new Error("No se pudo obtener token");



    const data =
            await response.json();


    token=data.token;


  }






  async function apiFetch(url,options={}){


    options.headers={

      "Content-Type":"application/json",

      ...(options.headers||{})

    };


    if(token){

      options.headers.Authorization =
              `Bearer ${token}`;

    }



    return fetch(url,options);

  }







  async function loadBooks(){


    const response =
            await fetch(API);



    const books =
            await response.json();



    const list =
            document.getElementById("book-list");



    list.innerHTML="";



    books.forEach(book=>{

      renderBook(book);

    });


  }






  function renderBook(book){


    const col =
            document.createElement("div");



    col.className=
            "book col-sm-6 col-md-4 col-lg-3";



    col.dataset.id =
            book.id;



    col.innerHTML=`


<div class="card h-100 shadow-sm">



<img

src="${book.image || 'https://via.placeholder.com/200x300'}"

class="card-img-top"

height="300" alt="portada del libro">



<div class="card-body">


<h5 
class="card-title"
data-testid="book-title">

${book.title}

</h5>



<p>

<strong>Autor:</strong>

${book.author}

</p>



<p>

${book.isbn}

</p>




<button

class="btn btn-primary edit"

data-testid="edit-book">

Editar

</button>



<button

class="btn btn-danger delete"

data-testid="delete-book">

Borrar

</button>



</div>


</div>


`;



    document
            .getElementById("book-list")
            .appendChild(col);


  }








  document
          .getElementById("book-form")
          .addEventListener(
                  "submit",
                  async e=>{


                    e.preventDefault();



                    const book={


                      title:
                      document.getElementById("titulo").value,


                      author:
                      document.getElementById("autor").value,


                      isbn:
                      document.getElementById("isbn").value,


                      image:
                      document.getElementById("image").value


                    };




                    let url=API;

                    let method="POST";



                    if(editingBookId){


                      url=`${API}/${editingBookId}`;

                      method="PUT";


                    }



                    const response =
                            await apiFetch(
                                    url,
                                    {

                                      method,

                                      body:
                                              JSON.stringify(book)

                                    }
                            );




                    if(!response.ok)
                      return;




                    editingBookId=null;


                    e.target.reset();


                    document
                            .getElementById("saveButton")
                            .innerText="Agregar libro";



                    await loadBooks();



                  });









  document
          .getElementById("book-list")
          .addEventListener(
                  "click",
                  async e=>{


                    const card =
                            e.target.closest(".book");



                    if(!card)
                      return;



                    const id =
                            card.dataset.id;





                    if(
                            e.target.classList.contains("delete")
                    ){


                      const response =
                              await apiFetch(
                                      `${API}/${id}`,
                                      {
                                        method:"DELETE"
                                      }
                              );



                      if(response.ok)
                        await loadBooks();



                    }







                    if(
                            e.target.classList.contains("edit")
                    ){



                      const response =
                              await fetch(`${API}/${id}`);



                      const book =
                              await response.json();





                      document
                              .getElementById("titulo")
                              .value=book.title;



                      document
                              .getElementById("autor")
                              .value=book.author;



                      document
                              .getElementById("isbn")
                              .value=book.isbn;



                      document
                              .getElementById("image")
                              .value=
                              book.image?.startsWith("data:image")
                                      ?""
                                      :book.image;





                      editingBookId=id;



                      document
                              .getElementById("saveButton")
                              .innerText="Guardar cambios";



                    }



                  });








  window.onload=async()=>{


    try{


      await loadToken();

      await loadBooks();


    }catch(err){


      console.error(
              "Error iniciando:",
              err
      );


    }


  };



</script>


</body>

</html>
