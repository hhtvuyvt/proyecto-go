<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tienda de Libros</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- Barra de navegación -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Tienda&nbsp;de&nbsp;Libros</a>
    </div>
  </nav>

  <div class="container my-4">
    <!-- Formulario para agregar libros -->
    <h2 class="mb-3">Agregar Libro</h2>
    <form id="book-form" class="row g-3">
      <div class="col-md-6">
        <label for="titulo" class="form-label">Título</label>
        <input type="text" class="form-control" id="titulo" required>
      </div>
      <div class="col-md-6">
        <label for="autor" class="form-label">Autor</label>
        <input type="text" class="form-control" id="autor" required>
      </div>
      <div class="col-md-4">
        <label for="isbn" class="form-label">ISBN</label>
        <input type="text" class="form-control" id="isbn" required>
      </div>
      <div class="col-md-8">
        <label for="imagen" class="form-label">URL de la imagen</label>
        <input type="url" class="form-control" id="imagen" placeholder="https://..." required>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-success">Agregar</button>
      </div>
    </form>

    <hr class="my-4">

    <!-- Catálogo -->
    <h2 class="mb-3">Catálogo</h2>
    <div id="book-list" class="row gy-4">
      <!-- Aquí se insertarán los libros -->
    </div>
  </div>

  <!-- Bootstrap Bundle JS (incluye Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Lógica para añadir y eliminar libros -->
  <script>
    // Agregar libro
    document.getElementById('book-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const titulo = document.getElementById('titulo').value.trim();
      const autor  = document.getElementById('autor').value.trim();
      const isbn   = document.getElementById('isbn').value.trim();
      const imagen = document.getElementById('imagen').value.trim() || 'https://via.placeholder.com/150x220?text=Portada';

      if (!(titulo && autor && isbn)) return; // Validación básica

      const col = document.createElement('div');
      col.className = 'col-sm-6 col-md-4 col-lg-3';
      col.innerHTML = `
        <div class="card h-100 shadow-sm">
          <img src="${imagen}" class="card-img-top" alt="${titulo}">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">${titulo}</h5>
            <p class="card-text mb-1"><strong>Autor:</strong> ${autor}</p>
            <p class="card-text text-muted"><small>${isbn}</small></p>
            <button class="btn btn-outline-danger mt-auto eliminar">Eliminar</button>
          </div>
        </div>`;

      document.getElementById('book-list').appendChild(col);

      this.reset();
      document.getElementById('titulo').focus();
    });

    // Delegación de eventos para eliminar libro
    document.getElementById('book-list').addEventListener('click', function (e) {
      if (e.target.classList.contains('eliminar')) {
        e.target.closest('[class*="col-"]').remove();
      }
    });
  </script>
</body>
</html>
