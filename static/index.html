<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Proyecto Go - Biblioteca</title>


  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f5f5f5;
    }


    .container {
      max-width: 800px;
      margin:auto;
      background:white;
      padding:25px;
      border-radius:10px;
    }


    input {
      display:block;
      width:100%;
      margin:8px 0;
      padding:8px;
    }


    button {

      padding:8px 12px;
      margin:5px;

      cursor:pointer;
    }


    .book {

      border:1px solid #ddd;
      margin:10px 0;
      padding:15px;
      border-radius:8px;

    }


    #status {

      padding:10px;
      margin-bottom:15px;

    }

  </style>


</head>


<body>


<div class="container">


  <h1>📚 Biblioteca</h1>


  <div id="status">
    Cargando...
  </div>



  <h2>Agregar libro</h2>


  <label>
    Título
  </label>

  <input id="title">



  <label>
    Autor
  </label>

  <input id="author">



  <label>
    ISBN
  </label>

  <input id="isbn">



  <button onclick="createBook()">
    Agregar libro
  </button>




  <h2>Libros publicados</h2>


  <div id="books">

  </div>



</div>





<script>


  let jwtToken = "";




  // =====================
  // AUTENTICACION
  // =====================


  async function loadToken(){


    const response =
            await fetch("/api/login");


    if(!response.ok){

      throw new Error(
              "No se pudo obtener token"
      );

    }


    const data =
            await response.json();


    jwtToken =
            data.token;



  }




  // =====================
  // LIBROS
  // =====================



  async function loadBooks(){


    const response =
            await fetch("/api/books");



    const books =
            await response.json();



    const container =
            document.getElementById("books");



    container.innerHTML="";



    books.forEach(book=>{


      container.innerHTML += `


        <div class="book">


            <h3>
            ${book.title}
            </h3>


            <p>
            Autor:
            ${book.author}
            </p>


            <p>
            ISBN:
            ${book.isbn}
            </p>



            <button onclick="editBook(${book.id})">
                Editar
            </button>



            <button onclick="deleteBook(${book.id})">
                Borrar
            </button>



        </div>


        `;


    });


  }




  // =====================
  // CREAR
  // =====================



  async function createBook(){


    const book = {


      title:
      document.getElementById("title").value,


      author:
      document.getElementById("author").value,


      isbn:
      document.getElementById("isbn").value

    };




    const response =
            await fetch(
                    "/api/books",
                    {

                      method:"POST",


                      headers:{

                        "Content-Type":
                                "application/json"

                      },


                      body:
                              JSON.stringify(book)

                    }
            );



    if(!response.ok){

      alert(
              "Error creando libro"
      );

      return;

    }



    loadBooks();

  }





  // =====================
  // BORRAR
  // =====================



  async function deleteBook(id){



    const response =
            await fetch(
                    "/api/books/"+id,
                    {


                      method:"DELETE",


                      headers:{


                        "Authorization":
                                "Bearer "+jwtToken


                      }


                    }
            );




    if(!response.ok){

      alert(
              "Error borrando libro"
      );

      return;

    }




    loadBooks();



  }







  // =====================
  // EDITAR
  // =====================



  async function editBook(id){



    const title =
            prompt(
                    "Nuevo titulo:"
            );



    if(!title){

      return;

    }




    const book = {


      title:title


    };




    const response =
            await fetch(
                    "/api/books/"+id,
                    {

                      method:"PUT",


                      headers:{


                        "Content-Type":
                                "application/json",


                        "Authorization":
                                "Bearer "+jwtToken


                      },



                      body:
                              JSON.stringify(book)


                    }
            );





    if(!response.ok){

      alert(
              "Error editando libro"
      );

      return;

    }



    loadBooks();



  }






  // =====================
  // INICIO
  // =====================



  window.onload = async ()=>{


    try {


      await loadToken();


      await loadBooks();



      document.getElementById(
              "status"
      ).innerHTML =
              "Sistema conectado";



    }catch(error){


      console.error(error);


      document.getElementById(
              "status"
      ).innerHTML =
              "Error conectando con servidor";


    }



  };



</script>



</body>


</html>
